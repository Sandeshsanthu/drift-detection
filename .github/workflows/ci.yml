name: Infrastructure Drift Detection (GCP)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment label for reporting
        required: false
        default: production

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

env:
  TF_VERSION: "1.7.0"
  TF_IN_AUTOMATION: "true"

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Guardrail - reject terraform/apply usage in workflows
        run: |
          if grep -RIn --exclude-dir=.git --exclude-dir=.terraform -E '(^|[^a-zA-Z])terraform[[:space:]]+apply([^a-zA-Z]|$)' .github/workflows; then
            echo "Found terraform/apply usage in workflows. Rejecting."
            exit 1
          fi

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          set -o pipefail
          terraform plan -detailed-exitcode -input=false -out=tfplan 2>&1 | tee plan_output.txt
          tf_ec=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$tf_ec" >> "$GITHUB_OUTPUT"
          echo "Terraform plan exit code: $tf_ec"
        continue-on-error: true

      - name: Check for Drift
        id: drift
        run: |
          EXIT_CODE="${{ steps.plan.outputs.exit_code }}"
          if [ -z "$EXIT_CODE" ]; then
            echo "drift_detected=error" >> "$GITHUB_OUTPUT"
            echo "Missing plan exit_code output; treating as error."
            exit 0
          fi

          if [ "$EXIT_CODE" = "2" ]; then
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
          elif [ "$EXIT_CODE" = "1" ]; then
            echo "drift_detected=error" >> "$GITHUB_OUTPUT"
          else
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Drift Report
        if: steps.drift.outputs.drift_detected == 'true'
        run: |
          echo "## Drift Report for $ENVIRONMENT" > drift_report.md
          echo "" >> drift_report.md
          echo "Detected at: $(date -u)" >> drift_report.md
          echo "" >> drift_report.md
          echo '```' >> drift_report.md
          terraform show tfplan -no-color | tail -80 >> drift_report.md
          echo '```' >> drift_report.md

      - name: Create/Update GitHub Issue for Drift
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('drift_report.md', 'utf8');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'infrastructure-drift',
              state: 'open'
            });

            const title = `Infrastructure Drift Detected - ${process.env.ENVIRONMENT}`;
            const envIssue = existing.data.find(i => i.title === title);

            if (envIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: envIssue.number,
                body: report
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: report,
                labels: ['infrastructure-drift', process.env.ENVIRONMENT]
              });
            }

      - name: Send Webhook Notification (drift)
        if: steps.drift.outputs.drift_detected == 'true'
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d "{
            \"event\": \"drift_detected\",
            \"environment\": \"${ENVIRONMENT}\",
            \"repository\": \"${{ github.repository }}\",
            \"commit\": \"${{ github.sha }}\",
            \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
            \"message\": \"Infrastructure drift was detected in ${ENVIRONMENT}. A GitHub issue has been created or updated.\"
          }" '${{ secrets.DRIFT_WEBHOOK_URL }}'

      - name: Fail workflow to block downstream apply
        if: steps.drift.outputs.drift_detected == 'true'
        run: |
          echo "Failing job due to drift (prevents apply jobs gated on success)."
          exit 1
